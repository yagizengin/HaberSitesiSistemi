<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Gündem Türkiye</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border: 2px solid #1A1A1A;
            box-shadow: 10px 10px 0px #1A1A1A;
        }
        .auth-tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #DDD; }
        .tab-btn { background: none; border: none; font-family: var(--font-heading); font-size: 1.2rem; cursor: pointer; padding-bottom: 10px; color: #666; }
        .tab-btn.active { color: #1A1A1A; border-bottom: 2px solid #1A1A1A; font-weight: 900; }
        
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .auth-form input { padding: 12px; border: 1px solid #DDD; font-family: var(--font-body); outline: none; }
        .auth-form input:focus { border-color: #1A1A1A; }
        
        .auth-submit { background: #1A1A1A; color: #fff; padding: 15px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .auth-submit:hover { opacity: 0.9; }
        
        .toggle-text { font-size: 0.85rem; text-align: center; margin-top: 15px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-tabs">
        <button class="tab-btn active" id="login-tab">Giriş Yap</button>
        <button class="tab-btn" id="register-tab">Kayıt Ol</button>
    </div>

    <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="E-posta Adresi" required>
        <input type="password" id="login-pass" placeholder="Şifre" required>
        <button type="submit" class="auth-submit">OTURUM AÇ</button>
    </form>

    <form id="register-form" class="auth-form" style="display: none;">
        <input type="text" id="reg-name" placeholder="Ad Soyad" required>
        <input type="email" id="reg-email" placeholder="E-posta Adresi" required>
        <input type="password" id="reg-pass" placeholder="Şifre Oluştur" required>
        <button type="submit" class="auth-submit">HESAP OLUŞTUR</button>
    </form>
</div>

<script>
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    
    // 1. TAB GEÇİŞ MANTIĞI
    loginTab.onclick = () => {
        loginTab.classList.add('active'); registerTab.classList.remove('active');
        loginForm.style.display = 'flex'; registerForm.style.display = 'none';
    };
    registerTab.onclick = () => {
        registerTab.classList.add('active'); loginTab.classList.remove('active');
        registerForm.style.display = 'flex'; loginForm.style.display = 'none';
    };

    
    // 2. KAYIT OLMA (VERİ YAZMA)
    registerForm.onsubmit = (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pass = document.getElementById('reg-pass').value;

        //Ad Soyad kontrolü
        if (fullName.split(' ').length < 2) {
            alert("Lütfen adınızı ve soyadınızı tam giriniz.");
            return;
        }

        //Mevcut kullanıcı listesini çek veya boş dizi başlat
        let users = JSON.parse(localStorage.getItem('users')) || [];

        // E-posta eşsizlik kontrolü
        const userExists = users.find(u => u.email === email);
        if (userExists) {
            alert("Bu e-posta adresi zaten sisteme kayıtlı!");
            return;
        }

        // Yeni kullanıcıyı kaydetME
        users.push({
            id: Date.now(),
            fullName: fullName,
            email: email,
            password: pass,
            savedNews: []
        });

        localStorage.setItem('users', JSON.stringify(users));
        
        alert('Hesabınız başarıyla oluşturuldu! Giriş yapabilirsiniz.');
        loginTab.click(); // Giriş sekmesine yönlendir
    };

    
    // 3. GİRİŞ YAPMA (VERİ DOĞRULAMA)
    loginForm.onsubmit = (e) => {
        e.preventDefault();
        
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-pass').value;

        const users = JSON.parse(localStorage.getItem('users')) || [];

        // E-posta ve şifre eşleşmesini rasyonel olarak ara
        const user = users.find(u => u.email === email && u.password === pass);

        if (user) {
            // BAŞARILI GİRİŞ
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', user.fullName); // Kullanıcının gerçek ismini sakla
            localStorage.setItem('activeUserId', user.id);   // Kayıtlar için ID'yi sakla
            window.location.href = 'index.html';
        } else {
            // HATALI GİRİŞ
            alert("E-posta adresiniz veya şifreniz hatalı. Lütfen tekrar deneyin.");
        }
    };
</script>

</body>
</html>
