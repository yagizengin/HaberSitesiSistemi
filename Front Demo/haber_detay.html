    <div style="width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
        
        <div class="logo" style="font-family: 'Roboto Slab', serif; font-size: 1.8rem; font-weight: 900; color: #1A1A1A;">
            GÜNDEM TÜRKİYE
        </div>
        
        <div style="display: flex; align-items: center; gap: 30px;">
            <nav class="main-nav" style="display: flex; gap: 20px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.85rem;">
                <a href="index.html" style="color: #D32F2F; text-decoration: none;">ANA SAYFA'YA DÖN</a>

                <img src="https://i.ibb.co/Nd8JkT2z/Ana-Sayfa-Profil-con.png" 
                     alt="Profil" 
                     style="width: 100%; height: 100%; object-fit: cover;"

        <article id="detay-icerik">
