<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiketler - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}"><link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout('Etiket Yönetimi', ~{::content})}">
    <div th:fragment="content">
        <div th:if="${successMsg}" class="alert-msg success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert-msg error" th:text="${errorMsg}"></div>
        <div class="admin-card">
            <h2>Yeni Etiket Ekle</h2>
            <form th:action="@{/admin/etiket-ekle}" method="post" class="inline-form">
                <div class="form-group"><label>Etiket Adı</label><input type="text" name="name" required></div>
                <button type="submit" class="btn btn-primary">Ekle</button>
            </form>
        </div>
        <div class="admin-card">
            <h2>Mevcut Etiketler</h2>
            <div style="display:flex; flex-wrap:wrap; gap:10px;">
                <div th:each="tag : ${allTags}" class="badge badge-dark" style="font-size:0.85rem; padding:8px 12px; display:flex; align-items:center; gap:8px;">
                    <span th:text="${tag.name} + ' (' + ${tag.articles.size()} + ')'">Etiket (0)</span>
                    <form th:action="@{/admin/etiket-sil/{id}(id=${tag.tagId})}" method="post" style="display:inline;" onsubmit="return confirm('Bu etiketi silmek istediğinize emin misiniz? (Haberler silinmeyecektir)')">
                        <button type="submit" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:1.2rem; line-height:1; padding:0; font-weight:bold;">&times;</button>
                    </form>
                </div>
            </div>
            <p th:if="${allTags.isEmpty()}" style="color:#888;">Henüz etiket oluşturulmamış.</p>
        </div>
    </div>
</div>
</body>
</html>
