<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gündem Türkiye</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout('Dashboard', ~{::content})}">
    <div th:fragment="content">
        <div th:if="${successMsg}" class="alert-msg success" th:text="${successMsg}"></div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Toplam Kullanıcı</div>
                <div class="stat-value" th:text="${totalUsers}">0</div>
            </div>
            <div class="stat-card accent">
                <div class="stat-label">Yayınlanan Makale</div>
                <div class="stat-value" th:text="${totalArticles}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Aktif Kategori</div>
                <div class="stat-value" th:text="${totalCategories}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sistem Durumu</div>
                <div class="stat-value" style="font-size:1.2rem; color:#2e7d32;">● Aktif</div>
            </div>
        </div>
        <div class="admin-card">
            <h2>Hızlı Erişim</h2>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <a th:href="@{/admin/kullanicilar}" class="btn btn-outline">👥 Kullanıcılar</a>
                <a th:href="@{/admin/kategoriler}" class="btn btn-outline">📁 Kategoriler</a>
                <a th:href="@{/admin/makaleler}" class="btn btn-outline">📰 Makaleler</a>
                <a th:href="@{/admin/yorumlar}" class="btn btn-outline">💬 Yorumlar</a>
                <a th:href="@{/editor/yeni-makale}" class="btn btn-primary">➕ Yeni Makale</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
