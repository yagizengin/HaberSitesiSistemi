<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcılar - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}"><link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout('Kullanıcı Yönetimi', ~{::content})}">
    <div th:fragment="content">
        <div th:if="${successMsg}" class="alert-msg success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert-msg error" th:text="${errorMsg}"></div>

        <div class="admin-card" th:if="${pendingRequests != null && !pendingRequests.isEmpty()}" style="margin-bottom: 25px; border-top: 4px solid #28a745;">
            <h2 style="color: #28a745;">Bekleyen Editörlük Başvuruları</h2>
            <table class="data-table">
                <thead><tr><th>Başvuru ID</th><th>Kullanıcı Adı</th><th>E-posta</th><th>Başvuru Tarihi</th><th>İşlem</th></tr></thead>
                <tbody>
                    <tr th:each="req : ${pendingRequests}">
                        <td th:text="${req.requestId}">1</td>
                        <td th:text="${req.user.username}">user</td>
                        <td th:text="${req.user.email}">email</td>
                        <td th:text="${#temporals.format(req.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                        <td class="action-btns" style="display:flex; gap:10px;">
                            <form th:action="@{/admin/editor-basvuru/{id}/onayla(id=${req.requestId})}" method="post">
                                <button type="submit" class="btn btn-sm" style="background: #28a745; border-color: #28a745;">Onayla</button>
                            </form>
                            <form th:action="@{/admin/editor-basvuru/{id}/reddet(id=${req.requestId})}" method="post">
                                <button type="submit" class="btn btn-sm btn-danger">Reddet</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="admin-card">
            <h2>Kullanıcılar</h2>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Kullanıcı Adı</th><th>E-posta</th><th>Roller</th><th>Durum</th><th>Kayıt Tarihi</th><th>İşlem</th></tr></thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.userId}">1</td>
                        <td th:text="${u.username}">user</td>
                        <td th:text="${u.email}">email</td>
                        <td th:with="roleName=${u.roles.isEmpty() ? 'ROLE_USER' : u.roles.iterator().next().name}">
                            <form th:action="@{/admin/kullanici/{id}/rol-degistir(id=${u.userId})}" method="post" style="display:inline-block; margin:0;">
                                <select name="roleName" onchange="this.form.submit()" style="padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.85rem; background: #fff; cursor: pointer;">
                                    <option value="ROLE_USER" th:selected="${roleName == 'ROLE_USER'}">Kullanıcı</option>
                                    <option value="ROLE_EDITOR" th:selected="${roleName == 'ROLE_EDITOR'}">Editör</option>
                                    <option value="ROLE_ADMIN" th:selected="${roleName == 'ROLE_ADMIN'}">Admin</option>
                                </select>
                            </form>
                        </td>
                        <td><span th:if="${u.isActive()}" class="badge badge-success">Aktif</span><span th:unless="${u.isActive()}" class="badge badge-danger">Pasif</span></td>
                        <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                        <td class="action-btns">
                            <form th:action="@{/admin/kullanici/{id}/durum(id=${u.userId})}" method="post" class="ajax-form ajax-reload">
                                <button type="submit" class="btn btn-sm" th:classappend="${u.isActive()} ? 'btn-danger' : 'btn-primary'" th:text="${u.isActive()} ? 'Devre Dışı' : 'Aktifleştir'">Toggle</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
