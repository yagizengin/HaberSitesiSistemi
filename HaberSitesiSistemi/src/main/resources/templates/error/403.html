<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erişim Reddedildi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F7F7F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-box { text-align: center; }
        .error-box h1 { font-family: 'Roboto Slab', serif; font-size: 6rem; margin: 0; color: #D32F2F; }
        .error-box h2 { font-size: 1.3rem; margin: 10px 0 20px; color: #1A1A1A; }
        .error-box p { color: #888; margin-bottom: 30px; }
        .error-box a { padding: 12px 28px; background: #1A1A1A; color: #fff; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; }
        .error-box a:hover { background: #D32F2F; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>403</h1>
        <h2>Erişim Reddedildi</h2>
        <p>Bu sayfayı görüntüleme yetkiniz bulunmuyor.</p>
        <a href="/">Ana Sayfaya Dön</a>
    </div>
</body>
</html>
