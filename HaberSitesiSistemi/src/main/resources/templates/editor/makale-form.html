<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Makale Düzenle' : 'Yeni Makale'">Makale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@700;900&display=swap" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <link rel="stylesheet" th:href="@{/css/global.css}"><link rel="stylesheet" th:href="@{/css/admin.css}">
    <!-- QuillJS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        .editor-wrapper { max-width: 900px; margin: 40px auto; padding: 0 30px; }
        .editor-card { background: #fff; border: 1px solid #ddd; border-top: 4px solid #1A1A1A; padding: 40px; }
        .tag-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag-checkboxes label { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border: 1px solid #ddd; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .tag-checkboxes label:hover { border-color: #1A1A1A; }
        .tag-checkboxes input:checked + span { color: #D32F2F; font-weight: 700; }
    </style>
</head>
<body>
<div class="editor-wrapper">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h1 style="font-family:'Roboto Slab',serif; font-size:1.8rem;" th:text="${isEdit} ? 'Makale Düzenle' : 'Yeni Makale Oluştur'">Makale</h1>
        <a th:href="@{/editor}" class="btn btn-outline btn-sm">← Geri Dön</a>
    </div>

    <div th:if="${errorMsg}" class="alert-msg error" th:text="${errorMsg}"></div>

    <div class="editor-card">
        <form th:action="${isEdit} ? @{/editor/makale-duzenle/{id}(id=${article.articleId})} : @{/editor/yeni-makale}" method="post">
            <div class="form-group">
                <label>Başlık</label>
                <input type="text" name="title" required maxlength="255" th:value="${isEdit} ? ${article.title} : ''">
            </div>

            <div class="form-group">
                <label>Kategori</label>
                <select name="categoryId" required>
                    <option value="">Kategori seçin...</option>
                    <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"
                            th:selected="${isEdit && article.category != null && article.category.categoryId == cat.categoryId}">Kategori</option>
                </select>
            </div>

            <div class="form-group">
                <label>Etiketler</label>
                <div class="tag-checkboxes">
                    <label th:each="tag : ${allTags}">
                        <input type="checkbox" name="tagIds" th:value="${tag.tagId}"
                               th:checked="${isEdit && article.tags.contains(tag)}">
                        <span th:text="${tag.name}">Etiket</span>
                    </label>
                </div>
                <p th:if="${allTags.isEmpty()}" style="color:#888; font-size:0.85rem;">Henüz etiket oluşturulmamış.</p>
            </div>

            <div class="form-group">
                <label>Kapak Fotoğrafı</label>
                <div style="display:flex; align-items:center; gap: 10px;">
                    <input type="file" id="cover-upload" accept="image/*">
                    <button type="button" id="remove-cover-btn" class="btn btn-outline btn-sm" style="display:none;" onclick="removeCover()">Kaldır</button>
                </div>
                <input type="hidden" name="coverImageId" id="coverImageId" th:value="${isEdit && article.coverImage != null} ? ${article.coverImage.mediaId} : ''">
                <div id="cover-preview" style="margin-top:10px;">
                    <img th:if="${isEdit && article.coverImage != null}" th:src="${article.coverImage.fileUrl}" style="max-width: 200px; border: 1px solid #ddd;">
                </div>
            </div>

            <div class="form-group">
                <label>İçerik</label>
                <!-- Hidden input to hold HTML content for form submission -->
                <input type="hidden" name="content" id="content-input" th:value="${isEdit} ? ${article.content} : ''">
                <!-- Quill Editor Container -->
                <div id="editor" style="height: 400px; background: #fff;"></div>
            </div>

            <div style="display:flex; gap:12px; margin-top:20px;">
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Güncelle' : 'Kaydet'">Kaydet</button>
                <a th:href="@{/editor}" class="btn btn-outline">İptal</a>
            </div>
        </form>
    </div>
</div>

<script>
    // --- Cover Photo Upload ---
    const coverIdInput = document.getElementById('coverImageId');
    const removeBtn = document.getElementById('remove-cover-btn');
    
    if (coverIdInput.value) {
        removeBtn.style.display = 'block';
    }

    function removeCover() {
        coverIdInput.value = '';
        document.getElementById('cover-preview').innerHTML = '';
        document.getElementById('cover-upload').value = '';
        removeBtn.style.display = 'none';
    }

    document.getElementById('cover-upload').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        try {
            const response = await fetch('/editor/media/upload', {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                },
                body: formData
            });
            const result = await response.json();
            if (response.ok) {
                coverIdInput.value = result.mediaId;
                document.getElementById('cover-preview').innerHTML = '<img src="' + result.fileUrl + '" style="max-width: 200px; border: 1px solid #ddd;">';
                removeBtn.style.display = 'block';
            } else {
                alert('Yükleme başarısız oldu.');
            }
        } catch (err) {
            console.error(err);
            alert('Kapak fotoğrafı yüklenirken bir hata oluştu.');
        }
    });

    // --- QuillJS Setup ---
    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    var contentInput = document.getElementById('content-input');
    if (contentInput.value) {
        quill.clipboard.dangerouslyPasteHTML(contentInput.value);
    }

    // Custom Image Handler for Quill
    quill.getModule('toolbar').addHandler('image', () => {
        // Save the selection before the file input steals focus
        const range = quill.getSelection() || { index: quill.getLength() };
        
        const input = document.createElement('input');
        input.setAttribute('type', 'file');
        input.setAttribute('accept', 'image/*');
        input.click();

        input.onchange = async () => {
            const file = input.files[0];
            const formData = new FormData();
            formData.append('file', file);

            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            try {
                const response = await fetch('/editor/media/upload', {
                    method: 'POST',
                    headers: {
                        [csrfHeader]: csrfToken
                    },
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    quill.insertEmbed(range.index, 'image', result.fileUrl);
                    quill.setSelection(range.index + 1);
                } else {
                    alert('Görsel yüklenemedi.');
                }
            } catch (e) {
                console.error('Upload error:', e);
                alert('Görsel yüklenirken bir hata oluştu.');
            }
        };
    });

    // Sync Quill content on form submit
    document.querySelector('form').onsubmit = function() {
        contentInput.value = quill.root.innerHTML;
    };
</script>
</body>
</html>
