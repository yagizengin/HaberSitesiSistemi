<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="tr">
<head th:replace="~{fragments/layout :: head('Ana Sayfa')}"></head>
<link rel="stylesheet" th:href="@{/css/anasayfa.css}">
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <div th:replace="~{fragments/layout :: sidePanel}"></div>

    <main class="main-container">
        <!-- No articles state -->
        <div th:if="${heroArticle == null}" class="empty-state">
            <h2>Henüz yayınlanmış haber yok</h2>
            <p>Sistemde henüz yayınlanmış haber bulunmuyor.</p>
        </div>

        <section th:if="${heroArticle != null}">
            
            <!-- SECTION 1: HERO + SIDE STORIES -->
            <div class="hero-section">
                <!-- Hero Left (2/3) -->
                <article class="hero-main" th:onclick="|window.location.href='@{/haber/{id}(id=${heroArticle.articleId})}'|">
                    <span class="cat-badge" th:text="${heroArticle.category != null ? heroArticle.category.name : 'GENEL'}">KATEGORİ</span>
                    <img th:src="${heroArticle.coverImage != null ? heroArticle.coverImage.fileUrl : 'https://picsum.photos/seed/' + heroArticle.articleId + '/800/500'}" alt="Manşet">
                    <div class="hero-main-content">
                        <h2 th:text="${heroArticle.title}">Manşet Başlığı</h2>
                        <p th:text="${#strings.abbreviate(heroArticle.content.replaceAll('<[^>]*>', ''), 150)}">Özet metin...</p>
                    </div>
                </article>

                <!-- Side Stories Right (1/3) -->
                <div class="hero-side">
                    <article th:each="article : ${leftArticles}" class="side-item" th:onclick="|window.location.href='@{/haber/{id}(id=${article.articleId})}'|">
                        <img th:src="${article.coverImage != null ? article.coverImage.fileUrl : 'https://picsum.photos/seed/' + article.articleId + '/200/150'}" alt="Haber">
                        <div class="side-item-content">
                            <span class="cat-text" th:text="${article.category != null ? article.category.name : 'GENEL'}">KATEGORİ</span>
                            <h4 th:text="${article.title}">Haber Başlığı</h4>
                        </div>
                    </article>
                </div>
            </div>

            <!-- SECTION 2: GRID & MOST READ -->
            <div class="section-header">
                <h3>GÜNCEL HABERLER</h3>
            </div>
            
            <div class="content-section">
                
                <!-- Main Grid (3 Cols) -->
                <div class="grid-4-col" id="infinite-grid">
                    <!-- The rightArticles list -->
                    <article th:each="article : ${rightArticles}" class="news-card" th:onclick="|window.location.href='@{/haber/{id}(id=${article.articleId})}'|">
                        <span class="cat-badge" th:text="${article.category != null ? article.category.name : 'GENEL'}">KATEGORİ</span>
                        <img th:src="${article.coverImage != null ? article.coverImage.fileUrl : 'https://picsum.photos/seed/' + article.articleId + '/300/200'}" alt="Haber">
                        <div class="news-card-content">
                            <h4 th:text="${article.title}">Haber Başlığı</h4>
                        </div>
                        <div class="news-card-meta">
                            <span th:text="${#temporals.format(article.publishedAt, 'dd MMM yyyy')}">Tarih</span>
                            <span>📰</span>
                        </div>
                    </article>

                    <!-- The bottomArticles list -->
                    <article th:each="article : ${bottomArticles}" class="news-card" th:onclick="|window.location.href='@{/haber/{id}(id=${article.articleId})}'|">
                        <span class="cat-badge" th:text="${article.category != null ? article.category.name : 'GENEL'}">KATEGORİ</span>
                        <img th:src="${article.coverImage != null ? article.coverImage.fileUrl : 'https://picsum.photos/seed/' + article.articleId + '/300/200'}" alt="Haber">
                        <div class="news-card-content">
                            <h4 th:text="${article.title}">Haber Başlığı</h4>
                        </div>
                        <div class="news-card-meta">
                            <span th:text="${#temporals.format(article.publishedAt, 'dd MMM yyyy')}">Tarih</span>
                            <span>📰</span>
                        </div>
                    </article>
                </div>

                <!-- Most Read Sidebar (1 Col) -->
                <div class="most-read-sidebar">
                    <div class="section-header">
                        <h3>ÇOK OKUNANLAR</h3>
                    </div>
                    <div class="most-read-list" id="most-read-list">
                        <!-- Loaded dynamically via JS or falls back to recent articles -->
                        <div th:each="article, iterStat : ${leftArticles}" class="most-read-item" th:onclick="|window.location.href='@{/haber/{id}(id=${article.articleId})}'|">
                            <span class="most-read-num" th:text="${iterStat.count}">1</span>
                            <h4 th:text="${article.title}">Haber Başlığı</h4>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Infinite Scroll Loader -->
            <div id="load-more-trigger" style="height: 20px; margin-bottom: 20px;"></div>
            <div id="loading-spinner" style="display:none; text-align:center; padding: 20px; color: #888;">
                <div style="display: inline-block; width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #E2001A; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>

        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
    
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('load-more-trigger');
            const grid = document.getElementById('infinite-grid');
            const spinner = document.getElementById('loading-spinner');
            
            if (!trigger || !grid) return;
            
            let currentPage = 2; // Başlangıçta 12 haber (sayfa 0 ve 1) yüklendiği için 2'den başlıyoruz
            let isLoading = false;
            let hasMore = true;
            
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoading && hasMore) {
                    loadMoreArticles();
                }
            }, { rootMargin: '200px' });
            
            observer.observe(trigger);
            
            async function loadMoreArticles() {
                isLoading = true;
                spinner.style.display = 'block';
                try {
                    const res = await fetch(`/api/articles?page=${currentPage}&size=6&sort=publishedAt,desc`);
                    if (res.ok) {
                        const json = await res.json();
                        if (json.success && json.data.articles) {
                            const articles = json.data.articles;
                            if (articles.length === 0) {
                                hasMore = false;
                                observer.disconnect();
                            } else {
                                articles.forEach(article => {
                                    const imgUrl = article.coverImage ? article.coverImage.fileUrl : `https://picsum.photos/seed/${article.articleId}/300/200`;
                                    const categoryName = article.category ? article.category.name : 'GENEL';
                                    
                                    const articleHtml = `
                                        <article class="news-card" onclick="window.location.href='/haber/${article.articleId}'">
                                            <span class="cat-badge">${categoryName}</span>
                                            <img src="${imgUrl}" alt="Haber">
                                            <div class="news-card-content">
                                                <h4>${article.title}</h4>
                                            </div>
                                            <div class="news-card-meta">
                                                <span>${new Date(article.publishedAt).toLocaleDateString('tr-TR', {day:'2-digit', month:'short', year:'numeric'})}</span>
                                                <span>📰</span>
                                            </div>
                                        </article>
                                    `;
                                    grid.insertAdjacentHTML('beforeend', articleHtml);
                                });
                                currentPage++;
                            }
                        }
                    }
                } catch (e) {
                    console.error('Infinite scroll error', e);
                } finally {
                    isLoading = false;
                    spinner.style.display = 'none';
                }
            }

            // Load top 5 most read (mocked by sorting by title for now as we don't have a viewCount sort endpoint exposed, but viewCount exists on the model)
            async function loadMostRead() {
                try {
                    const res = await fetch(`/api/articles?page=0&size=5&sort=viewCount,desc`);
                    if (res.ok) {
                        const json = await res.json();
                        if (json.success && json.data.articles) {
                            const list = document.getElementById('most-read-list');
                            if(list && json.data.articles.length > 0) {
                                list.innerHTML = ''; // clear initial
                                json.data.articles.forEach((a, i) => {
                                    list.innerHTML += `
                                    <div class="most-read-item" onclick="window.location.href='/haber/${a.articleId}'">
                                        <span class="most-read-num">${i+1}</span>
                                        <h4>${a.title}</h4>
                                    </div>`;
                                });
                            }
                        }
                    }
                } catch(e) {}
            }
            loadMostRead();
        });
    </script>
</body>
</html>
